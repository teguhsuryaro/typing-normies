<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Test Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Typing Normies</h1>
        
        <div class="stats">
            <div class="stat-box">WPM: <span id="wpm">0</span></div>
            <div class="stat-box">Akurasi: <span id="accuracy">100</span>%</div>
            <div class="stat-box">Waktu: <span id="timer">60</span>s</div>
        </div>

        <div id="quote-display" class="quote-display">
        </div>

        <textarea id="quote-input" class="quote-input" autofocus placeholder="Mulai mengetik di sini..."></textarea>

        <button id="start-btn">Ulangi</button>

        <div class="copyright">&copy; 2026 Typing Normies Project v1.0.1 . Crafted by Surya Ganteng.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
